apiVersion: apps/v1
kind: Deployment
metadata:
  name: botnet-detector-deployment
  labels:
    app: botnet-detector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: botnet-detector
  template:
    metadata:
      labels:
        app: botnet-detector
    spec:
      containers:
      - name: botnet-detector
        image: botnet-detector:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
